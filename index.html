<!doctype html>
<html lang="en">
  <head>

    <title>Personalized expense tracker</title>

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

    <!-- html -->
    <!-- header section -->
    <div class="header">
      <h1>Good Morning, User</h1>

        <div class="drop-down">Daily <i class="fas fa-chevron-down"></i></div>

    </div>
