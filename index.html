<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personalized expense tracker</title>

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- css -->
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/content.css" />
  </head>
  <body>
    <!-- header -->
    <header>
      <h1>Good Morning, User!</h1>
      <div class="header-content">
        <div class="days-header">Daily <i class="fas fa-chevron-down"></i></div>
        <div class="date-header">
          <i class="fas fa-calendar"></i>
          11 April 2026
        </div>

        <div class="export">
          <i class="fas fa-download"></i>
          Export
        </div>
      </div>

      <button class="mobile-btn">
        <i id="ham" class="fa-solid fa-bars"></i>
      </button>
    </header>
    <!-- mobile view-->
    <div class="header-content-mobile">
      <button class="close-sidebar"><i class="fa-solid fa-xmark"></i></button>

      <div class="days-header">Daily <i class="fas fa-chevron-down"></i></div>
      <div class="date-header">
        <i class="fas fa-calendar"></i>
        11 April 2026
      </div>

      <div class="export">
        <i class="fas fa-download"></i>
        Export
      </div>
    </div>

    <!-- main content -->
    <section class="content">
      <div class="expense-grid">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Income</h3>
            <i id="ecp" class="fas fa-ellipsis"></i>
          </div>
          <div class="amount income-amount">$4,800.00</div>
          <div class="changes">
            <i class="fas fa-arrow-up"></i>12% vs last month
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Expenses</h3>
            <i id="ecp" class="fas fa-ellipsis"></i>
          </div>
          <div class="amount income-amount">$1,800.00</div>
          <div class="changes">
            <i class="fas fa-arrow-up"></i>12% vs last month
          </div>
        </div>
        <div class="my-card">
          <div class="card-header">
            <h3 class="card-title">My Card</h3>
            <i id="ecp" class="fas fa-ellipsis"></i>
          </div>
          <div style="font-size: 1.1rem; opacity: 0.8; margin-bottom: 1rem">
            Linked to your Bank Account or wallet
          </div>
          <div class="card-chip"></div>
          <div class="card-number">5435 2735 0037 0015</div>

          <div class="card-holder">Mazino</div>

          <div class="card-logo">
            <div class="card-logo-circle logo-red"></div>
            <div class="card-logo-circle logo-orange"></div>
          </div>

          <div class="spending-section">
            <div
              style="margin-bottom: 0.5rem; font-size: 0.875rem; opacity: 0.9"
            >
              Spending Limit
            </div>
            <div class="spending-limit">$4,645.00</div>
            <div class="spending-used">used from $12,645.00</div>
            <div class="progress-bar">
              <div class="progress-fill"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- js -->
    <script src="/js/app.js"></script>
  </body>
</html>
